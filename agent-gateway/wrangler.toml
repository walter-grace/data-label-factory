name = "dlf-gateway"
main = "src/index.ts"
compatibility_date = "2026-04-17"

# Public agent gateway for Data Label Factory.
# Exposes /v1/crawl, /v1/gather, /v1/label, /v1/train-yolo/* over pay-per-call
# API keys backed by Workers KV.
#
# Deploy: wrangler deploy
# Dev:    wrangler dev --local
#
# Required vars (set via `wrangler secret put`):
#   CF_ACCOUNT_ID           — for Browser Rendering /crawl
#   CF_API_TOKEN            — scoped: Browser Rendering Edit
#   DLF_VERCEL_BASE_URL     — e.g. https://data-label-factory.vercel.app
#   ADMIN_KEY               — bearer token for /v1/admin/* (create keys, top up)
#
# KV binding:
#   KEYS — stores { balance_cents: number, created_at: number, label: string } by api key

[vars]
# Defaults; override via `wrangler secret put` for production values
DLF_VERCEL_BASE_URL = "https://data-label-factory.vercel.app"
# Public base for /v1/upload responses — points at the R2 bucket's managed
# dev URL. If we ever move to a custom r2 domain, swap this without
# rewriting stored keys.
UPLOADS_PUBLIC_BASE = "https://pub-151beee55fe645ef9a9d500191813394.r2.dev"

[[kv_namespaces]]
binding = "KEYS"
id = "02983ae980df4abaa4a4c9ad929f8080"

# R2 bucket for /v1/upload. Stores agent-submitted images under
# {key_short}/{uuid}.{ext}. Managed public URL is set via UPLOADS_PUBLIC_BASE
# so callers never hit the Worker just to fetch an image.
[[r2_buckets]]
binding = "UPLOADS"
bucket_name = "dlf-uploads"

# Scheduled payouts are DISABLED for now — jackpot stays admin-only
# until we're comfortable with the cron surface in prod. Flip this on
# later by uncommenting the trigger; the scheduled() handler in
# index.ts is already wired and calls JackpotDO /payout via its DO
# binding (no HTTP, no secret).
#
# [triggers]
# crons = ["0 0 * * *"]

# Durable Object for leaderboard + activity feed (serializes concurrent writes).
[[durable_objects.bindings]]
name = "LEADERBOARD"
class_name = "LeaderboardDO"

# Durable Object for the Label Jackpot pool. Contributions happen on every
# trust-verified label. Payouts are ADMIN-ONLY (no scheduled alarm, no MCP
# tool) to prevent any agent-driven prompt-injection path to treasury.
[[durable_objects.bindings]]
name = "JACKPOT"
class_name = "JackpotDO"

# Per-key DO that serializes all balance/XP mutations (idFromName(key)).
# Closes whitehat QA 2026-04-19 race: N parallel /v1/label calls debiting once.
[[durable_objects.bindings]]
name = "USER_STATE"
class_name = "UserStateDO"

# Per-job DO for the labeling marketplace. Serializes submissions against
# a single job so "first valid submission per image wins" is atomic.
[[durable_objects.bindings]]
name = "JOBS"
class_name = "JobsDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["LeaderboardDO"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["JackpotDO"]

[[migrations]]
tag = "v3"
new_sqlite_classes = ["UserStateDO"]

[[migrations]]
tag = "v4"
new_sqlite_classes = ["JobsDO"]

# Pricing (cents) — override in code if needed.
# crawl:      1¢/page
# gather:     0.1¢ (rounded up to 1¢)
# label:      0.2¢/image (rounded up)
# train-yolo: 5¢/job
